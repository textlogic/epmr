  // =========================
  // CSV helpers
  // =========================
  function parseCsv(csvText) {
    const lines = csvText.trim().split(/\r?\n/);
    if (!lines.length) return [];
    const headers = splitCsvLine(lines[0]);

    return lines.slice(1).filter(Boolean).map(line => {
      const values = splitCsvLine(line);
      const row = {};
      headers.forEach((header, i) => {
        row[header] = (values[i] ?? "").trim();
      });
      return row;
    });
  }

  function splitCsvLine(line) {
    const result = [];
    let current = "";
    let inQuotes = false;

    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      const next = line[i + 1];

      if (ch === '"' && inQuotes && next === '"') {
        current += '"';
        i++;
      } else if (ch === '"') {
        inQuotes = !inQuotes;
      } else if (ch === "," && !inQuotes) {
        result.push(current);
        current = "";
      } else {
        current += ch;
      }
    }

    result.push(current);
    return result;
  }

  const appointments = parseCsv(APPOINTMENTS_CSV);
  const appointmentLabs = parseCsv(APPOINTMENT_LABS_CSV);

  // =========================

  const physicianByKey = Object.fromEntries(
    physicians.map(p => [p.physician_key, p])
  );

  const labsByAppointmentId = Object.fromEntries(
    appointmentLabs.map(l => [l.appointment_id, l])
  );

  const appointmentFacts = appointments.map(appt => {
    const physician = physicianByKey[appt.physician_key] || {};
    const labs = labsByAppointmentId[appt.appointment_id] || {};

    return {
      appointment_id: appt.appointment_id,
      physician_key: appt.physician_key,
      physician_name: physician.physician_name || "",
      physician_zipcode: physician.zipcode || "",
      physician_state: physician.state || "",

  function buildCompactContext(question) {
    const q = (question || "").toLowerCase();

    const physicianHits = physicians.filter(p => {
      return (
        q.includes((p.physician_key || "").toLowerCase()) ||
        q.includes((p.physician_name || "").toLowerCase()) ||
        q.includes((p.zipcode || "").toLowerCase()) ||
        q.includes((p.state || "").toLowerCase())
      );
    });

    const appointmentHits = appointmentFacts.filter(a => {
      const haystack = [
        a.appointment_id,
        a.physician_key,
        a.physician_name,
        a.member_name,
        a.member_city,
        a.member_state,
        a.member_zipcode,
        a.synthetic_medicare_id,
        a.appointment_date
      ].join(" ").toLowerCase();

      return q && haystack.includes(q);
    });

    const fallbackAppointments = appointmentFacts.slice(0, MAX_CONTEXT_ROWS);

    return {
      physicians_count: physicians.length,
      appointments_count: appointments.length,
      appointment_labs_count: appointmentLabs.length,
      tables_available: [
        "physicians",
        "appointments",
        "appointment_labs",
        "data_dictionary"
      ],
      matched_physicians: physicianHits.slice(0, 20),
      matched_appointments: appointmentHits.length
        ? appointmentHits.slice(0, MAX_CONTEXT_ROWS)
        : fallbackAppointments,
      data_dictionary: dataDictionary
    };
  }

  function buildSystemPrompt() {
    return [
      "You are Obi-Wan, a data assistant answering questions about embedded synthetic healthcare scheduling data.",
      "Use only the supplied dataset and do not invent facts.",
      "If the answer cannot be determined from the provided data, say that clearly.",
      "Be concise but helpful.",
      "When useful, summarize counts and patterns.",
      "The dataset contains synthetic physicians, appointments, and lab requirement flags."
    ].join(" ");
  }

  function buildUserPrompt(question) {
    const context = buildCompactContext(question);

    return [
      "Answer the user's question using the embedded data below.",
      "",
      "USER QUESTION:",
      question,
      "",
      "DATA DICTIONARY CSV:",
      DATA_DICTIONARY_CSV,
      "",
      "PHYSICIANS CSV:",

      "",
      "APPOINTMENTS SAMPLE/RELEVANT FACTS JSON:",
      JSON.stringify(context, null, 2),
      "",
      "LABS CSV:",
      APPOINTMENT_LABS_CSV
    ].join("\n");
  }

      const url = base.includes("?api-version=")
        ? base
        : `${base}?api-version=${encodeURIComponent(OPENAI_API_VERSION)}`;

      const response = await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "api-key": OPENAI_API_KEY
        },
        body: JSON.stringify({
          messages: [
            { role: "system", content: systemPrompt },
            { role: "user", content: userPrompt }
          ],
          temperature: TEMPERATURE
        })
      });

      if (!response.ok) {
        const text = await response.text();
        throw new Error(`OpenAI request failed: ${response.status} ${text}`);
      }

      const json = await response.json();
      return json?.choices?.[0]?.message?.content || "No answer returned.";
    }

    // OpenAI Responses API style
    const response = await fetch(OPENAI_ENDPOINT, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${OPENAI_API_KEY}`
      },
      body: JSON.stringify({
        model: OPENAI_MODEL_OR_DEPLOYMENT,
        input: [
          {
            role: "system",
            content: [
              { type: "input_text", text: systemPrompt }
            ]
          },
          {
            role: "user",
            content: [
              { type: "input_text", text: userPrompt }
            ]
          }
        ],
        temperature: TEMPERATURE
      })
    });

    if (!response.ok) {
      const text = await response.text();
      throw new Error(`OpenAI request failed: ${response.status} ${text}`);
    }

    const json = await response.json();

    if (json.output_text) {
      return json.output_text;
    }

    const textParts = [];
    for (const item of json.output || []) {
      for (const content of item.content || []) {
        if (content.type === "output_text" && content.text) {
          textParts.push(content.text);
        }
      }
    }

    return textParts.join("\n").trim() || "No answer returned.";
  }

  // =========================
  // UI
  // =========================
  function createUI() {
    document.body.style.margin = "0";
    document.body.style.fontFamily = "Arial, sans-serif";
    document.body.style.background = "#f5f7fb";
    document.body.style.color = "#1f2937";

    const app = document.createElement("div");
    app.style.maxWidth = "980px";
    app.style.margin = "32px auto";
    app.style.background = "#ffffff";
    app.style.border = "1px solid #e5e7eb";
    app.style.borderRadius = "16px";
    app.style.boxShadow = "0 12px 30px rgba(0,0,0,0.08)";
    app.style.padding = "24px";

    const title = document.createElement("h1");
    title.textContent = "Ask Obi-Wan";
    title.style.margin = "0 0 8px 0";
    title.style.fontSize = "28px";

    const subtitle = document.createElement("div");
    subtitle.textContent = "Ask questions about the embedded physicians, appointments, and labs data.";
    subtitle.style.marginBottom = "20px";
    subtitle.style.color = "#4b5563";

    const label = document.createElement("label");
    label.textContent = "Ask Obi-Wan";
    label.setAttribute("for", "obiwan-question");
    label.style.display = "block";
    label.style.fontWeight = "700";
    label.style.marginBottom = "8px";

    const textarea = document.createElement("textarea");
    textarea.id = "obiwan-question";
    textarea.placeholder = "Example: How many appointments are scheduled in Texas on 2026-04-20?";
    textarea.style.width = "100%";
    textarea.style.minHeight = "120px";
    textarea.style.boxSizing = "border-box";
    textarea.style.padding = "14px";
    textarea.style.border = "1px solid #d1d5db";
    textarea.style.borderRadius = "12px";
    textarea.style.fontSize = "16px";
    textarea.style.resize = "vertical";

    const buttonRow = document.createElement("div");
    buttonRow.style.display = "flex";
    buttonRow.style.gap = "12px";
    buttonRow.style.marginTop = "14px";
    buttonRow.style.alignItems = "center";

    const askBtn = document.createElement("button");
    askBtn.textContent = "Ask";
    askBtn.style.background = "#f97316";
    askBtn.style.color = "#ffffff";
    askBtn.style.border = "none";
    askBtn.style.borderRadius = "10px";
    askBtn.style.padding = "12px 18px";
    askBtn.style.fontSize = "15px";
    askBtn.style.fontWeight = "700";
    askBtn.style.cursor = "pointer";

    const status = document.createElement("span");
    status.textContent = "";
    status.style.color = "#6b7280";
    status.style.fontSize = "14px";

    const answerBox = document.createElement("div");
    answerBox.style.marginTop = "20px";
    answerBox.style.padding = "16px";
    answerBox.style.border = "1px solid #e5e7eb";
    answerBox.style.borderRadius = "12px";
    answerBox.style.background = "#fafafa";
    answerBox.style.whiteSpace = "pre-wrap";
    answerBox.style.minHeight = "100px";
    answerBox.textContent = "Answer will appear here.";

    const meta = document.createElement("div");
    meta.style.marginTop = "16px";
    meta.style.fontSize = "13px";
    meta.style.color = "#6b7280";
    meta.textContent = `Embedded data: ${physicians.length} physicians, ${appointments.length} appointments, ${appointmentLabs.length} lab records.`;

    buttonRow.appendChild(askBtn);
    buttonRow.appendChild(status);

    app.appendChild(title);
    app.appendChild(subtitle);
    app.appendChild(label);
    app.appendChild(textarea);
    app.appendChild(buttonRow);
    app.appendChild(answerBox);
    app.appendChild(meta);

    document.body.appendChild(app);

    async function handleAsk() {
      const question = textarea.value.trim();
      if (!question) {
        answerBox.textContent = "Please enter a question.";
        return;
      }

      askBtn.disabled = true;
      askBtn.style.opacity = "0.7";
      status.textContent = "Thinking...";
      answerBox.textContent = "";

      try {
        const answer = await askOpenAI(question);
        answerBox.textContent = answer;
      } catch (err) {
        console.error(err);
        answerBox.textContent = `Error: ${err.message}`;
      } finally {
        askBtn.disabled = false;
        askBtn.style.opacity = "1";
        status.textContent = "";
      }
    }

    askBtn.addEventListener("click", handleAsk);
    textarea.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
        handleAsk();
      }
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", createUI);
  } else {
    createUI();
  }
})();

  </script>
