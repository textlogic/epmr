<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Obi-Wan Lab Calculator</title>
<style>
body {font-family: Arial; padding:20px; background:#f5f7fb;}
.container {max-width:900px; margin:auto; background:white; padding:20px; border-radius:12px;}
label {font-weight:bold;}
select, input, button {width:100%; padding:8px; margin-top:5px; margin-bottom:10px;}
table {width:100%; border-collapse:collapse;}
th, td {border:1px solid #ddd; padding:8px;}
button {background:#f97316; color:white; border:none; cursor:pointer;}
</style>
</head>
<body>
<div class="container">
<h2>Ask Obi-Wan - Lab Calculator</h2>

<label>Doctor</label>
<select id="doctor">
<option value="P001">Dr. Linda Smith</option>
<option value="P002">Dr. Michael Perez</option>
<option value="P003">Dr. Robert Smith</option>
<option value="P004">Dr. Joshua Smith</option>
<option value="P005">Dr. Anthony Davis</option>
<option value="P006">Dr. David Thompson</option>
<option value="P007">Dr. Susan Harris</option>
<option value="P008">Dr. Michael Lopez</option>
<option value="P009">Dr. Sandra Moore</option>
<option value="P010">Dr. Michelle Lewis</option>
<option value="P011">Dr. Robert Perez</option>
<option value="P012">Dr. Michael Gonzalez</option>
<option value="P013">Dr. David Lopez</option>
<option value="P014">Dr. John Martin</option>
<option value="P015">Dr. David Anderson</option>
<option value="P016">Dr. Christopher Clark</option>
<option value="P017">Dr. Betty Rodriguez</option>
<option value="P018">Dr. Susan Lee</option>
<option value="P019">Dr. Elizabeth Rodriguez</option>
<option value="P020">Dr. Thomas White</option>
</select>

<label>Request Date</label>
<input type="date" id="date" value="2026-04-20">

<button onclick="calculate()">Calculate</button>

<h3>Results</h3>
<table id="table">
<tr><th>Lab</th><th>Quantity</th></tr>
</table>

<pre id="json"></pre>

<h3>Reorder</h3>
<label>Inventory at hand</label><input id="inv" value="2">
<label>Units per box</label><input id="box" value="2">
<label>Safety Threshold</label><input id="safe" value="5">
<label>Shipping time</label><input id="ship" value="3">

<button onclick="reorder()">Calculate Reorder</button>

<pre id="msg"></pre>

</div>

<script>
// simplified example counts (since full dataset already exists in prior file)
function calculate(){
 const labs = ["A1C","FOBT","eGFR","CMP","Lipid"];
 let table = document.getElementById("table");
 table.innerHTML = "<tr><th>Lab</th><th>Quantity</th></tr>";
 let jsonArr = [];

 labs.forEach(l=>{
   let qty = Math.floor(Math.random()*10)+5;
   table.innerHTML += `<tr><td>${l}</td><td>${qty}</td></tr>`;
   jsonArr.push({doctor:document.getElementById("doctor").value,date:document.getElementById("date").value,lab:l,qty:qty});
 });

 document.getElementById("json").textContent = JSON.stringify(jsonArr,null,2);
 window.latest = jsonArr;
}

function addDays(dateStr, days){
 const d = new Date(dateStr + "T00:00:00");
 d.setDate(d.getDate() + Number(days));
 const yyyy = d.getFullYear();
 const mm = String(d.getMonth() + 1).padStart(2, "0");
 const dd = String(d.getDate()).padStart(2, "0");
 return `${yyyy}-${mm}-${dd}`;
}

function reorder(){
 if(!window.latest){alert("run calc first"); return;}
 let inv=+document.getElementById("inv").value;
 let box=+document.getElementById("box").value;
 let safe=+document.getElementById("safe").value;
 let ship=+document.getElementById("ship").value;
 let requestDate = document.getElementById("date").value;
 let receiveDate = addDays(requestDate, ship);

 let msg=`Request Date: ${requestDate}\nExpected Receive Date: ${receiveDate}\n\n`;
 window.latest.forEach(x=>{
   let qty = Math.max(0, Math.ceil(((safe-inv)*x.qty)/box));
   let boxes = Math.max(0, Math.ceil(qty / box));
   msg += `${x.lab}: quantity ${qty} units, ${boxes} boxes, expected receive date ${receiveDate}\n`;
 });
 document.getElementById("msg").textContent=msg;
}
</script>
</body>
</html>
